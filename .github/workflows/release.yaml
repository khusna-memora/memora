name: Build & Release Memora Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            binary: agent_runner_linux_x64
            pkg_target: node18-linux-x64
          - os: macos
            arch: x64
            runner: macos-13
            binary: agent_runner_macos_x64
            pkg_target: node18-macos-x64
          - os: macos
            arch: arm64
            runner: macos-latest
            binary: agent_runner_macos_arm64
            pkg_target: node18-macos-arm64
          - os: windows
            arch: x64
            runner: windows-latest
            binary: agent_runner_windows_x64.exe
            pkg_target: node18-win-x64
          - os: windows
            arch: arm64
            runner: windows-latest
            binary: agent_runner_windows_arm64.exe
            pkg_target: node18-win-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci --production
      - run: npm install -g pkg
      - run: pkg src/index.js --target ${{ matrix.pkg_target }} --output ${{ matrix.binary }} --compress GZip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: binaries/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: Memora ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🧠 Memora ${{ github.ref_name }}
            The first Pearl inter-agent memory layer in the Olas ecosystem.
            Binaries: agent_runner_linux_x64 | agent_runner_macos_x64 | agent_runner_macos_arm64 | agent_runner_windows_x64.exe | agent_runner_windows_arm64.exe
          files: binaries/*
