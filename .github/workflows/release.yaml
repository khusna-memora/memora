name: Build & Release Memora Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            binary: agent_runner_linux_x64
            pkg_target: node18-linux-x64

          - os: macos
            arch: x64
            runner: macos-13
            binary: agent_runner_macos_x64
            pkg_target: node18-macos-x64

          - os: macos
            arch: arm64
            runner: macos-latest
            binary: agent_runner_macos_arm64
            pkg_target: node18-macos-arm64

          - os: windows
            arch: x64
            runner: windows-latest
            binary: agent_runner_windows_x64.exe
            pkg_target: node18-win-x64

          - os: windows
            arch: arm64
            runner: windows-latest
            binary: agent_runner_windows_arm64.exe
            pkg_target: node18-win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production

      - name: Install pkg
        run: npm install -g pkg

      - name: Build binary
        run: |
          pkg src/index.js \
            --target ${{ matrix.pkg_target }} \
            --output ${{ matrix.binary }} \
            --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/
          merge-multiple: true

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Memora ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🧠 Memora ${{ steps.version.outputs.VERSION }}

            The first Pearl inter-agent memory layer in the Olas ecosystem.

            ### Binaries (Pearl-compatible)

            Download the binary for your platform and run it as a Pearl agent:

            | Platform | Binary |
            |---|---|
            | Linux x64 | `agent_runner_linux_x64` |
            | macOS x64 | `agent_runner_macos_x64` |
            | macOS arm64 | `agent_runner_macos_arm64` |
            | Windows x64 | `agent_runner_windows_x64.exe` |
            | Windows arm64 | `agent_runner_windows_arm64.exe` |

            ### Quick start
            ```bash
            chmod +x agent_runner_linux_x64
            ./agent_runner_linux_x64 --password <your-keystore-password>
            ```

            Then open http://localhost:8716 in Pearl or your browser.

            ---
            *Memora — memora.codes — ERC-8004 verified on Base*
          files: binaries/*
          draft: false
          prerelease: false
